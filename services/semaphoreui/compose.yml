services:
  semaphoreui-db:
    image: ${SEMAPHOREUI_DB_IMAGE:-postgres:16.8-alpine}
    container_name: semaphoreui-db
    profiles:
      - semaphoreui
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${SEMAPHOREUI_DB_NAME:-semaphore}
      - POSTGRES_USER=${SEMAPHOREUI_DB_USER:-semaphore}
      - POSTGRES_PASSWORD=${SEMAPHOREUI_DB_PASSWORD}
    volumes:
      - semaphoreui-db-data:/var/lib/postgresql/data
    networks:
      - semaphoreui-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SEMAPHOREUI_DB_USER:-semaphore} -d ${SEMAPHOREUI_DB_NAME:-semaphore}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  semaphoreui:
    image: ${SEMAPHOREUI_IMAGE:-semaphoreui/semaphore:v2.17.14}
    container_name: semaphoreui
    profiles:
      - semaphoreui
    restart: unless-stopped
    depends_on:
      semaphoreui-db:
        condition: service_healthy
    environment:
      - SEMAPHORE_DB_DIALECT=postgres
      - SEMAPHORE_DB_HOST=semaphoreui-db:5432
      - SEMAPHORE_DB_NAME=${SEMAPHOREUI_DB_NAME:-semaphore}
      - SEMAPHORE_DB_USER=${SEMAPHOREUI_DB_USER:-semaphore}
      - SEMAPHORE_DB_PASS=${SEMAPHOREUI_DB_PASSWORD}
      - SEMAPHORE_DB_OPTIONS={"sslmode":"disable"}
      - SEMAPHORE_ADMIN=${SEMAPHOREUI_ADMIN_LOGIN:-admin}
      - SEMAPHORE_ADMIN_PASSWORD=${SEMAPHOREUI_ADMIN_PASSWORD}
      - SEMAPHORE_ADMIN_NAME=${SEMAPHOREUI_ADMIN_NAME:-Admin}
      - SEMAPHORE_ADMIN_EMAIL=${SEMAPHOREUI_ADMIN_EMAIL:-admin@localhost}
      - SEMAPHORE_COOKIE_HASH=${SEMAPHOREUI_COOKIE_HASH}
      - SEMAPHORE_COOKIE_ENCRYPTION=${SEMAPHOREUI_COOKIE_ENCRYPTION}
      - SEMAPHORE_ACCESS_KEY_ENCRYPTION=${SEMAPHOREUI_ACCESS_KEY_ENCRYPTION}
      - SEMAPHORE_WEB_ROOT=https://${SEMAPHOREUI_HOSTNAME:-semaphore}.${DEV_DOMAIN}
      - SEMAPHORE_PORT=:3000
      - SEMAPHORE_OIDC_PROVIDERS=${SEMAPHOREUI_OIDC_PROVIDERS_JSON:-{}}
      - SEMAPHORE_PASSWORD_LOGIN_DISABLED=${SEMAPHOREUI_PASSWORD_LOGIN_DISABLED:-false}
      - SEMAPHORE_LOG_LEVEL=${SEMAPHOREUI_LOG_LEVEL:-info}
    networks:
      - proxy
      - semaphoreui-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.semaphoreui-web.rule=Host(`${SEMAPHOREUI_HOSTNAME:-semaphore}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.semaphoreui-web.entrypoints=web"
      - "traefik.http.routers.semaphoreui-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
      - "traefik.http.routers.semaphoreui-websecure.rule=Host(`${SEMAPHOREUI_HOSTNAME:-semaphore}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.semaphoreui-websecure.entrypoints=websecure"
      - "traefik.http.routers.semaphoreui-websecure.tls=true"
      - "traefik.http.routers.semaphoreui-websecure.tls.certresolver=${TLS_CERT_RESOLVER:-}"
      - "traefik.http.routers.semaphoreui-websecure.middlewares=security-headers@file"
      - "traefik.http.routers.semaphoreui-websecure.service=semaphoreui-service"
      - "traefik.http.services.semaphoreui-service.loadbalancer.server.port=3000"
      - "com.aladroc.observability.enabled=${SEMAPHOREUI_OBSERVABILITY_ENABLED:-false}"
      - "com.aladroc.observability.discovery=${SEMAPHOREUI_OBSERVABILITY_DISCOVERY:-labels}"
      - "com.aladroc.observability.logs=true"
      - "com.aladroc.observability.metrics=false"
      - "com.aladroc.observability.service=semaphoreui"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/ping >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

networks:
  semaphoreui-internal:
    internal: true

volumes:
  semaphoreui-db-data:
