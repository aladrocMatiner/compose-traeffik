services:
  docling:
    image: ${DOCLING_IMAGE:-ghcr.io/docling-project/docling-serve-cpu:${DOCLING_IMAGE_TAG:-main}}
    container_name: docling
    profiles:
      - docling
    restart: unless-stopped
    depends_on:
      docling-redis:
        condition: service_healthy
    networks:
      - proxy
      - docling-internal
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=5001
      - UVICORN_PROXY_HEADERS=true
      - UVICORN_ROOT_PATH=${DOCLING_UVICORN_ROOT_PATH:-}
      - DOCLING_SERVE_ENABLE_UI=${DOCLING_ENABLE_UI:-true}
      - DOCLING_SERVE_LOG_LEVEL=${DOCLING_LOG_LEVEL:-WARNING}
      - DOCLING_SERVE_API_KEY=${DOCLING_API_KEY:-}
      - DOCLING_SERVE_ENG_KIND=${DOCLING_ENGINE_KIND:-local}
      - DOCLING_SERVE_ENG_RQ_REDIS_URL=redis://:${DOCLING_REDIS_PASSWORD:-}@docling-redis:6379/
      - DOCLING_SERVE_ARTIFACTS_PATH=${DOCLING_ARTIFACTS_PATH:-/var/lib/docling/artifacts}
      - DOCLING_SERVE_SCRATCH_PATH=${DOCLING_SCRATCH_PATH:-/var/lib/docling/scratch}
      - DOCLING_SERVE_MAX_SYNC_WAIT=${DOCLING_MAX_SYNC_WAIT:-120}
      - DOCLING_SERVE_LOAD_MODELS_AT_BOOT=${DOCLING_LOAD_MODELS_AT_BOOT:-true}
      - DOCLING_SERVE_OTEL_ENABLE_METRICS=${DOCLING_SERVE_OTEL_ENABLE_METRICS:-false}
      - DOCLING_SERVE_OTEL_ENABLE_TRACES=${DOCLING_SERVE_OTEL_ENABLE_TRACES:-false}
      - DOCLING_SERVE_OTEL_ENABLE_PROMETHEUS=${DOCLING_SERVE_OTEL_ENABLE_PROMETHEUS:-false}
      - DOCLING_SERVE_OTEL_SERVICE_NAME=${DOCLING_SERVE_OTEL_SERVICE_NAME:-docling-serve}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${DOCLING_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - DOCLING_KEYCLOAK_ENABLED=${DOCLING_KEYCLOAK_ENABLED:-false}
      - DOCLING_KEYCLOAK_MODE=${DOCLING_KEYCLOAK_MODE:-external}
      - DOCLING_KEYCLOAK_INTERNAL_URL=${DOCLING_KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      - DOCLING_KEYCLOAK_EXTERNAL_URL=${DOCLING_KEYCLOAK_EXTERNAL_URL:-}
      - DOCLING_KEYCLOAK_CLIENT_ID=${DOCLING_KEYCLOAK_CLIENT_ID:-}
      - DOCLING_KEYCLOAK_CLIENT_SECRET=${DOCLING_KEYCLOAK_CLIENT_SECRET:-}
      - DOCLING_KEYCLOAK_ISSUER=${DOCLING_KEYCLOAK_ISSUER:-}
      - DOCLING_OBSERVABILITY_ENABLED=${DOCLING_OBSERVABILITY_ENABLED:-false}
    volumes:
      - docling-artifacts:/var/lib/docling/artifacts
      - docling-scratch:/var/lib/docling/scratch
      - docling-model-cache:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\", 5001)); s.close()'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docling-web.rule=Host(`${DOCLING_HOSTNAME:-docling}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.docling-web.entrypoints=web"
      - "traefik.http.routers.docling-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
      - "traefik.http.routers.docling-websecure.rule=Host(`${DOCLING_HOSTNAME:-docling}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.docling-websecure.entrypoints=websecure"
      - "traefik.http.routers.docling-websecure.service=docling-service"
      - "traefik.http.routers.docling-websecure.tls=true"
      - "traefik.http.routers.docling-websecure.tls.certresolver=${TLS_CERT_RESOLVER:-}"
      - "traefik.http.routers.docling-websecure.middlewares=${DOCLING_TRAEFIK_MIDDLEWARES:-security-headers@file}"
      - "traefik.http.services.docling-service.loadbalancer.server.port=5001"
      - "docling.observability.enabled=${DOCLING_OBSERVABILITY_ENABLED:-false}"
      - "prometheus.io/scrape=${DOCLING_OBSERVABILITY_ENABLED:-false}"
      - "prometheus.io/port=5001"
      - "prometheus.io/path=${DOCLING_PROMETHEUS_METRICS_PATH:-/metrics}"

  docling-redis:
    image: ${DOCLING_REDIS_IMAGE:-redis:7.2.11-alpine}
    container_name: docling-redis
    profiles:
      - docling
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${DOCLING_REDIS_PASSWORD:-}
    networks:
      - docling-internal
    volumes:
      - docling-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${DOCLING_REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    environment:
      - DOCLING_REDIS_PASSWORD=${DOCLING_REDIS_PASSWORD:-}

networks:
  docling-internal:
    name: docling-internal
    internal: true

volumes:
  docling-artifacts:
    name: docling-artifacts
  docling-scratch:
    name: docling-scratch
  docling-model-cache:
    name: docling-model-cache
  docling-redis-data:
    name: docling-redis-data
