services:
  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.81.12-stable}
    container_name: litellm
    profiles:
      - litellm
    restart: unless-stopped
    networks:
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - LITELLM_LOCAL_API_BASE=${LITELLM_LOCAL_API_BASE:-http://host.docker.internal:11434}
      - LITELLM_LOCAL_MODEL_ALIAS=${LITELLM_LOCAL_MODEL_ALIAS:-local-ollama}
      - LITELLM_LOCAL_MODEL_REF=${LITELLM_LOCAL_MODEL_REF:-ollama/llama3.1:8b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    command:
      - "--config=/app/config.yaml"
      - "--port"
      - "${LITELLM_PORT:-4000}"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_PORT:-4000}/health/liveliness')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellm-web.rule=Host(`${LITELLM_HOSTNAME:-llm}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.litellm-web.entrypoints=web"
      - "traefik.http.routers.litellm-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
      - "traefik.http.routers.litellm-websecure.rule=Host(`${LITELLM_HOSTNAME:-llm}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.litellm-websecure.entrypoints=websecure"
      - "traefik.http.routers.litellm-websecure.service=litellm-service"
      - "traefik.http.routers.litellm-websecure.tls=true"
      - "traefik.http.routers.litellm-websecure.tls.certresolver=${TLS_CERT_RESOLVER:-}"
      - "traefik.http.routers.litellm-websecure.middlewares=${LITELLM_MIDDLEWARES:-security-headers@file}"
      - "traefik.http.routers.litellm-admin-web.rule=Host(`${LITELLM_UI_HOSTNAME:-llm-admin}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.litellm-admin-web.entrypoints=web"
      - "traefik.http.routers.litellm-admin-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
      - "traefik.http.routers.litellm-admin-websecure.rule=Host(`${LITELLM_UI_HOSTNAME:-llm-admin}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.litellm-admin-websecure.entrypoints=websecure"
      - "traefik.http.routers.litellm-admin-websecure.service=litellm-service"
      - "traefik.http.routers.litellm-admin-websecure.tls=true"
      - "traefik.http.routers.litellm-admin-websecure.tls.certresolver=${TLS_CERT_RESOLVER:-}"
      - "traefik.http.routers.litellm-admin-websecure.middlewares=${LITELLM_UI_MIDDLEWARES:-security-headers@file,litellm-ui-auth@file}"
      - "traefik.http.services.litellm-service.loadbalancer.server.port=${LITELLM_PORT:-4000}"
