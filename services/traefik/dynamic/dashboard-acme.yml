# File: traefik/dynamic/dashboard-acme.yml
#
# Traefik dashboard routing (basic auth protected) with ACME cert resolver.
#

http:
  routers:
    traefik-dashboard:
      rule: "Host(`__TRAEFIK_DASHBOARD_HOST__`)"
      entryPoints:
        - websecure
      middlewares:
        - security-headers
        - traefik-dashboard-auth
      service: api@internal
      tls:
        certResolver: "__TLS_CERT_RESOLVER__"
