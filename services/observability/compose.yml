services:
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.3.2}
    container_name: grafana
    profiles:
      - observability
    restart: unless-stopped
    networks:
      - proxy
      - observability-internal
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-}
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_HOSTNAME:-grafana}.${DEV_DOMAIN}
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana-web.rule=Host(`${GRAFANA_HOSTNAME:-grafana}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.grafana-web.entrypoints=web"
      - "traefik.http.routers.grafana-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
      - "traefik.http.routers.grafana-websecure.rule=Host(`${GRAFANA_HOSTNAME:-grafana}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.grafana-websecure.entrypoints=websecure"
      - "traefik.http.routers.grafana-websecure.service=grafana-service"
      - "traefik.http.routers.grafana-websecure.tls=true"
      - "traefik.http.routers.grafana-websecure.tls.certresolver=${TLS_CERT_RESOLVER:-}"
      - "traefik.http.routers.grafana-websecure.middlewares=security-headers@file"
      - "traefik.http.services.grafana-service.loadbalancer.server.port=3000"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.5.1}
    container_name: prometheus
    profiles:
      - observability
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}
      - --web.enable-remote-write-receiver
    networks:
      - observability-internal
      - proxy
    volumes:
      - ./services/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.6.3}
    container_name: loki
    profiles:
      - observability
    restart: unless-stopped
    command:
      - -config.expand-env=true
      - -config.file=/etc/loki/local-config.yaml
    networks:
      - observability-internal
    environment:
      - LOKI_RETENTION_PERIOD=${LOKI_RETENTION_PERIOD:-168h}
    volumes:
      - ./services/observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.6.1}
    container_name: tempo
    profiles:
      - observability
    restart: unless-stopped
    command:
      - -config.expand-env=true
      - -config.file=/etc/tempo/tempo.yml
    networks:
      - observability-internal
    environment:
      - TEMPO_RETENTION_PERIOD=${TEMPO_RETENTION_PERIOD:-168h}
    volumes:
      - ./services/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

  pyroscope:
    image: ${PYROSCOPE_IMAGE:-grafana/pyroscope:1.12.0}
    container_name: pyroscope
    profiles:
      - observability
    restart: unless-stopped
    command:
      - -target=all
      - -log.level=info
      - -server.http-listen-port=4040
      - -server.grpc-listen-port=4041
      - -auth.multitenancy-enabled=false
      - -storage.backend=filesystem
      - -storage.filesystem.dir=/var/lib/pyroscope
      - -compactor.blocks-retention-period=${PYROSCOPE_RETENTION_PERIOD:-168h}
    networks:
      - observability-internal
    volumes:
      - pyroscope-data:/var/lib/pyroscope

  alloy:
    image: ${ALLOY_IMAGE:-grafana/alloy:v1.11.2}
    container_name: alloy
    profiles:
      - observability
    restart: unless-stopped
    command:
      - run
      - --stability.level=public-preview
      - /etc/alloy/config.alloy
    networks:
      - observability-internal
    volumes:
      - ./services/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy-data:/var/lib/alloy

  k6:
    image: ${K6_IMAGE:-grafana/k6:0.49.0}
    container_name: k6
    profiles:
      - observability
    restart: "no"
    command:
      - run
      - /scripts/smoke.js
    networks:
      - observability-internal
      - proxy
    environment:
      - K6_TARGET_URL=${K6_TARGET_URL:-https://whoami.${DEV_DOMAIN}}
      - K6_ITERATIONS=${K6_ITERATIONS:-10}
      - K6_SLEEP_SECONDS=${K6_SLEEP_SECONDS:-1}
      - K6_OUT=${K6_OUT:-experimental-prometheus-rw}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL:-http://prometheus:9090/api/v1/write}
      - K6_PROMETHEUS_RW_TREND_STATS=${K6_PROMETHEUS_RW_TREND_STATS:-p(50),p(90),p(95),p(99),min,max,avg}
    volumes:
      - ./services/observability/k6:/scripts:ro

networks:
  observability-internal:
    name: observability-internal
    internal: true

volumes:
  grafana-data:
    name: grafana-data
  prometheus-data:
    name: prometheus-data
  loki-data:
    name: loki-data
  tempo-data:
    name: tempo-data
  pyroscope-data:
    name: pyroscope-data
  alloy-data:
    name: alloy-data
