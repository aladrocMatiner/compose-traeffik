services:
  bind:
    image: internetsystemsconsortium/bind9:9.20
    container_name: bind
    profiles:
      - bind
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - proxy
    ports:
      - "${BIND_BIND_ADDRESS:-10.64.70.90}:53:53/udp"
      - "${BIND_BIND_ADDRESS:-10.64.70.90}:53:53/tcp"
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN}
    volumes:
      - ./services/dns-bind/config/named.conf.template:/etc/bind/named.conf.template:ro
      - ./services/dns-bind/zones:/zones:ro
    tmpfs:
      - /tmp
      - /run/named
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - 'sed "s/__BASE_DOMAIN__/${BASE_DOMAIN}/g" /etc/bind/named.conf.template > /tmp/named.conf && named-checkconf /tmp/named.conf && named-checkzone "${BASE_DOMAIN}" "/zones/db.${BASE_DOMAIN}" && exec named -g -c /tmp/named.conf'
