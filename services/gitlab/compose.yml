services:
  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:17.11.0-ce.0}
    container_name: gitlab
    restart: unless-stopped
    hostname: ${GITLAB_HOSTNAME:-gitlab}.${DEV_DOMAIN}
    profiles:
      - gitlab
    environment:
      GITLAB_ROOT_EMAIL: ${GITLAB_ROOT_EMAIL:-admin@local.test}
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD}
      GITLAB_OMNIBUS_CONFIG: |
        external_url "https://${GITLAB_HOSTNAME:-gitlab}.${DEV_DOMAIN}"
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['proxy_set_headers'] = {
          "X-Forwarded-Proto" => "https",
          "X-Forwarded-Ssl" => "on",
          "X-Forwarded-Port" => "443",
          "X-Forwarded-Host" => "${GITLAB_HOSTNAME:-gitlab}.${DEV_DOMAIN}"
        }
        gitlab_rails['gitlab_https'] = true
        gitlab_rails['env'] = {
          "SSL_CERT_FILE" => "/opt/stepca/root_ca.crt",
          "SSL_CERT_DIR" => "/etc/ssl/certs"
        }
        gitlab_rails['omniauth_enabled'] = true
        gitlab_rails['omniauth_allow_single_sign_on'] = ['openid_connect']
        gitlab_rails['omniauth_block_auto_created_users'] = false
        gitlab_rails['omniauth_auto_link_user'] = ['openid_connect']
        gitlab_rails['omniauth_auto_sign_in_with_provider'] = nil
        gitlab_rails['omniauth_providers'] = [
          {
            name: "openid_connect",
            label: "${GITLAB_OIDC_PROVIDER_LABEL:-Keycloak}",
            args: {
              name: "openid_connect",
              scope: ["openid", "profile", "email"],
              response_type: "code",
              issuer: "${KEYCLOAK_OIDC_BASE_URL}/realms/${KEYCLOAK_REALM}",
              discovery: true,
              client_auth_method: "query",
              uid_field: "preferred_username",
              pkce: true,
              client_options: {
                identifier: "${GITLAB_OIDC_CLIENT_ID}",
                secret: "${GITLAB_OIDC_CLIENT_SECRET}",
                redirect_uri: "https://${GITLAB_HOSTNAME:-gitlab}.${DEV_DOMAIN}/users/auth/openid_connect/callback"
              }
            }
          }
        ]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.gitlab-web.rule=Host(`${GITLAB_HOSTNAME:-gitlab}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.gitlab-web.entrypoints=web"
      - "traefik.http.routers.gitlab-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
      - "traefik.http.routers.gitlab-websecure.rule=Host(`${GITLAB_HOSTNAME:-gitlab}.${DEV_DOMAIN}`)"
      - "traefik.http.routers.gitlab-websecure.entrypoints=websecure"
      - "traefik.http.routers.gitlab-websecure.tls=true"
      - "traefik.http.routers.gitlab-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
      - "traefik.http.routers.gitlab-websecure.middlewares=security-headers@file"
      - "traefik.http.routers.gitlab-websecure.service=gitlab-service"
      - "traefik.http.services.gitlab-service.loadbalancer.server.port=80"
    shm_size: "256m"
    healthcheck:
      disable: true
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
      - ./services/step-ca/certs/root_ca.crt:/opt/stepca/root_ca.crt:ro
    networks:
      - proxy

volumes:
  gitlab-config:
    name: gitlab-config
  gitlab-logs:
    name: gitlab-logs
  gitlab-data:
    name: gitlab-data
