    regexp: '(?ms)(\n  alloy:\n.*?\n    networks:\n      - observability-internal\n)(?!\s*-\s+proxy)'
    replace: '\1      - proxy\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Remove misplaced Alloy HTTP listen flag from unrelated commands
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?m)^      - --server\.http\.listen-addr=0\.0\.0\.0:12345\n'
    replace: ""
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Alloy listens on 0.0.0.0 for reverse proxy access
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?ms)(\n  alloy:\n.*?\n    command:\n      - run\n      - --stability\.level=public-preview\n)(\s*      - --server\.http\.listen-addr=0\.0\.0\.0:12345\n)?'
    replace: '\1      - --server.http.listen-addr=0.0.0.0:12345\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Expose Alloy through Traefik in observability project
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "    # {mark} alloy traefik managed block"
    insertafter: '      - alloy-data:/var/lib/alloy'
    block: |
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.alloy-web.rule=Host(`${ALLOY_HOSTNAME:-alloy}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.alloy-web.entrypoints=web"
          - "traefik.http.routers.alloy-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
          - "traefik.http.routers.alloy-websecure.rule=Host(`${ALLOY_HOSTNAME:-alloy}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.alloy-websecure.entrypoints=websecure"
          - "traefik.http.routers.alloy-websecure.service=alloy-service"
          - "traefik.http.routers.alloy-websecure.tls=true"
          - "traefik.http.routers.alloy-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
          - "traefik.http.routers.alloy-websecure.middlewares=security-headers@file"
          - "traefik.http.services.alloy-service.loadbalancer.server.port=12345"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Normalize observability Traefik managed block indentation in compose
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?m)^(labels:|  - "traefik\.)'
    replace: "    \\1"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Stop legacy step-ca container when project does not declare step-ca service
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} stop step-ca
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  register: deployment_project_stepca_stop_cmd
  changed_when: >-
    (deployment_project_stepca_stop_cmd.stdout | default('')) is search('Stopped')
  failed_when: false
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Remove legacy step-ca container when project does not declare step-ca service
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} rm -f step-ca
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  register: deployment_project_stepca_rm_cmd
  changed_when: >-
    (deployment_project_stepca_rm_cmd.stdout | default('')) is search('Removing')
    or
    (deployment_project_stepca_rm_cmd.stdout | default('')) is search('Removed')
  failed_when: false
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Apply docker compose stack for project manifest contract
  ansible.builtin.command:
    cmd: >-
      ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} up -d
      {{ deployment_project_manifest_data.services | join(' ') }}
  args:
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  changed_when: true

- name: Bootstrap shared Keycloak realm and initial user (traefik-keycloak)
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a

    realm="${KEYCLOAK_BOOTSTRAP_REALM:-local.test}"
    username="${KEYCLOAK_BOOTSTRAP_USERNAME:-jose.romero}"
    password="${KEYCLOAK_BOOTSTRAP_PASSWORD:-abcd123}"
    admin_user="${KEYCLOAK_ADMIN:-admin}"
    admin_pass="${KEYCLOAK_ADMIN_PASSWORD:-}"

    [ -n "${admin_user}" ]
    [ -n "${admin_pass}" ]
    [ -n "${realm}" ]
    [ -n "${username}" ]
    [ -n "${password}" ]

    # Wait for Keycloak admin endpoint before kcadm bootstrap.
    for _ in $(seq 1 20); do
      if ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh config credentials \
        --server http://127.0.0.1:8080 \
        --realm master \
        --user "${admin_user}" \
        --password "${admin_pass}" >/dev/null 2>&1; then
        break
      fi
      sleep 3
    done

    ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh config credentials \
      --server http://127.0.0.1:8080 \
      --realm master \
      --user "${admin_user}" \
      --password "${admin_pass}" >/dev/null

    set +e
    ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh get "realms/${realm}" >/dev/null 2>&1
    realm_exists_rc=$?
    set -e
    if [ "${realm_exists_rc}" -ne 0 ]; then
      ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh create realms -s realm="${realm}" -s enabled=true >/dev/null
      changed=1
    else
      ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh update "realms/${realm}" -s enabled=true >/dev/null
      changed=0
    fi

    set +e
    create_user_output="$(
      ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh create users -r "${realm}" \
        -s username="${username}" -s enabled=true -s emailVerified=true 2>&1
    )"
    create_user_rc=$?
    set -e
    if [ "${create_user_rc}" -eq 0 ]; then
      changed=1
    elif echo "${create_user_output}" | grep -Eqi 'already exists|User exists'; then
      true
    fi

    for _ in $(seq 1 20); do
      if ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh set-password \
        -r "${realm}" \
        --username "${username}" \
        --new-password "${password}" \
        --temporary=false >/dev/null 2>&1; then
        break
      fi
      sleep 2
    done

    ./scripts/compose.sh --profile keycloak exec -T keycloak /opt/keycloak/bin/kcadm.sh set-password \
      -r "${realm}" \
      --username "${username}" \
      --new-password "${password}" \
      --temporary=false >/dev/null

    if [ "${changed:-0}" -eq 1 ]; then
      echo "changed"
    fi
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  register: deployment_project_keycloak_bootstrap_cmd
  changed_when: >-
    (deployment_project_keycloak_bootstrap_cmd.stdout | default('')) is search('changed')
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Ensure Keycloak admin authentication works before OIDC provisioning
  ansible.builtin.uri:
    url: "{{ deployment_project_keycloak_oidc_base_url_effective }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      grant_type: password
      username: "{{ deployment_project_keycloak_admin_username }}"
      password: "{{ deployment_project_keycloak_admin_password }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: deployment_project_keycloak_admin_token_response
  retries: 10
  delay: 6
  until: deployment_project_keycloak_admin_token_response.status == 200
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Extract Keycloak admin access token for project OIDC provisioning
  ansible.builtin.set_fact:
    deployment_project_keycloak_admin_access_token: "{{ (deployment_project_keycloak_admin_token_response.content | from_json).access_token }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Resolve OIDC client contract for observability project
  ansible.builtin.set_fact:
    deployment_project_oidc_client_id_effective: "{{ deployment_project_keycloak_client_id_effective }}"
    deployment_project_oidc_redirect_uris:
      - "https://grafana.{{ deployment_project_base_domain_cmd.stdout | trim }}/login/generic_oauth"
    deployment_project_oidc_web_origins:
      - "https://grafana.{{ deployment_project_base_domain_cmd.stdout | trim }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure OIDC client contract shape for observability project
  ansible.builtin.assert:
    that:
      - deployment_project_oidc_client_id_effective | trim | length > 0
      - deployment_project_oidc_redirect_uris | length > 0
      - deployment_project_oidc_web_origins | length > 0
    fail_msg: "Malformed OIDC contract for observability project."
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Query Keycloak client by client_id in target realm
  ansible.builtin.uri:
    url: "{{ deployment_project_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_keycloak_realm_effective }}/clients?clientId={{ deployment_project_oidc_client_id_effective | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ deployment_project_keycloak_admin_access_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: deployment_project_keycloak_client_lookup
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Parse existing OIDC client lookup result
  ansible.builtin.set_fact:
    deployment_project_keycloak_existing_client: "{{ ((deployment_project_keycloak_client_lookup.content | from_json) | first) if ((deployment_project_keycloak_client_lookup.content | from_json) | length > 0) else {} }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Create OIDC client in Keycloak when missing
  ansible.builtin.uri:
    url: "{{ deployment_project_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_keycloak_realm_effective }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ deployment_project_keycloak_admin_access_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      clientId: "{{ deployment_project_oidc_client_id_effective }}"
      enabled: true
      protocol: "openid-connect"
      publicClient: false
      directAccessGrantsEnabled: false
      standardFlowEnabled: true
      serviceAccountsEnabled: false
      redirectUris: "{{ deployment_project_oidc_redirect_uris }}"
      webOrigins: "{{ deployment_project_oidc_web_origins }}"
      attributes:
        pkce.code.challenge.method: ""
    validate_certs: false
    status_code: 201
  when:
    - deployment_project_manifest_data.id == "traefik-observability"
    - deployment_project_keycloak_existing_client == {}

- name: Refresh OIDC client lookup after create
  ansible.builtin.uri:
    url: "{{ deployment_project_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_keycloak_realm_effective }}/clients?clientId={{ deployment_project_oidc_client_id_effective | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ deployment_project_keycloak_admin_access_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: deployment_project_keycloak_client_lookup_after_create
  when:
    - deployment_project_manifest_data.id == "traefik-observability"
    - deployment_project_keycloak_existing_client == {}

- name: Resolve effective Keycloak client id for update/secret
  ansible.builtin.set_fact:
    deployment_project_keycloak_client_uuid: >-
      {{
        (
          (deployment_project_keycloak_client_lookup_after_create.content | from_json | first).id
        ) if (deployment_project_keycloak_existing_client == {})
        else deployment_project_keycloak_existing_client.id
      }}
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Update OIDC client contract in Keycloak
  ansible.builtin.uri:
    url: "{{ deployment_project_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_keycloak_realm_effective }}/clients/{{ deployment_project_keycloak_client_uuid }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ deployment_project_keycloak_admin_access_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      id: "{{ deployment_project_keycloak_client_uuid }}"
      clientId: "{{ deployment_project_oidc_client_id_effective }}"
      enabled: true
      protocol: "openid-connect"
      publicClient: false
      directAccessGrantsEnabled: false
      standardFlowEnabled: true
      serviceAccountsEnabled: false
      redirectUris: "{{ deployment_project_oidc_redirect_uris }}"
      webOrigins: "{{ deployment_project_oidc_web_origins }}"
      secret: "{{ deployment_project_grafana_oidc_client_secret_effective }}"
      attributes:
        pkce.code.challenge.method: ""
    validate_certs: false
    status_code: 204
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Verify traefik serves non-default TLS certificate for whoami (stepca-acme)
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a
    host="${WHOAMI_HOST:-whoami.${BASE_DOMAIN}}"
    issuer="$(echo | openssl s_client -connect 127.0.0.1:443 -servername "${host}" 2>/dev/null | openssl x509 -noout -issuer)"
    echo "${issuer}"
    if echo "${issuer}" | grep -q "TRAEFIK DEFAULT CERT"; then
      exit 1
    fi
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  register: deployment_project_tls_issuer_check
  changed_when: false
  retries: 10
  delay: 6
  until: deployment_project_tls_issuer_check.rc == 0
  when:
    - deployment_project_manifest_data.id == "traefik-stepca"
    - "'whoami' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Ensure deployment-project state directory exists for remote user
  ansible.builtin.file:
    path: "{{ deployment_project_state_home }}/{{ deployment_project_state_relpath | dirname }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: false

- name: Read current deployment-project state
  ansible.builtin.stat:
    path: "{{ deployment_project_state_home }}/{{ deployment_project_state_relpath }}"
  register: deployment_project_state_stat
  become: false

- name: Read current deployment-project state payload
  ansible.builtin.slurp:
    src: "{{ deployment_project_state_stat.stat.path }}"
  register: deployment_project_state_raw
  become: false
  when: deployment_project_state_stat.stat.exists

- name: Build updated deployment-project state payload
  ansible.builtin.set_fact:
    deployment_project_current_state: "{{ {'deployed_projects': []} }}"

- name: Parse existing deployment-project state payload
  ansible.builtin.set_fact:
    deployment_project_current_state: "{{ deployment_project_state_raw.content | b64decode | from_json }}"
  when:
    - deployment_project_state_stat.stat.exists
    - deployment_project_state_raw.content is defined
    - deployment_project_state_raw.content | b64decode | trim | length > 0

- name: Compose updated deployment-project state payload
  ansible.builtin.set_fact:
    deployment_project_state_payload:
      deployed_projects: "{{ ((deployment_project_current_state.deployed_projects | default([])) + [deployment_project_manifest_data.id]) | unique | sort }}"

- name: Persist deployment-project state payload
  ansible.builtin.copy:
    dest: "{{ deployment_project_state_home }}/{{ deployment_project_state_relpath }}"
    content: "{{ deployment_project_state_payload | to_nice_json }}"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: false
