          - "traefik.http.routers.tempo-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
          - "traefik.http.routers.tempo-websecure.rule=Host(`${TEMPO_HOSTNAME:-tempo}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.tempo-websecure.entrypoints=websecure"
          - "traefik.http.routers.tempo-websecure.service=tempo-service"
          - "traefik.http.routers.tempo-websecure.tls=true"
          - "traefik.http.routers.tempo-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
          - "traefik.http.routers.tempo-websecure.middlewares=tempo-root-redirect,security-headers@file"
          - "traefik.http.middlewares.tempo-root-redirect.redirectregex.regex=^https?://([^/]+)/?$"
          - "traefik.http.middlewares.tempo-root-redirect.redirectregex.replacement=https://$${1}/metrics"
          - "traefik.http.services.tempo-service.loadbalancer.server.port=3200"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Pyroscope is attached to proxy network for Traefik exposure
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?ms)(\n  pyroscope:\n.*?\n    networks:\n      - observability-internal\n)(?!\s*-\s+proxy)'
    replace: '\1      - proxy\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Expose Pyroscope through Traefik in observability project
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "    # {mark} pyroscope traefik managed block"
    insertafter: '      - pyroscope-data:/var/lib/pyroscope'
    block: |
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.pyroscope-web.rule=Host(`${PYROSCOPE_HOSTNAME:-pyroscope}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.pyroscope-web.entrypoints=web"
          - "traefik.http.routers.pyroscope-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
          - "traefik.http.routers.pyroscope-websecure.rule=Host(`${PYROSCOPE_HOSTNAME:-pyroscope}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.pyroscope-websecure.entrypoints=websecure"
          - "traefik.http.routers.pyroscope-websecure.service=pyroscope-service"
          - "traefik.http.routers.pyroscope-websecure.tls=true"
          - "traefik.http.routers.pyroscope-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
          - "traefik.http.routers.pyroscope-websecure.middlewares=security-headers@file"
          - "traefik.http.services.pyroscope-service.loadbalancer.server.port=4040"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Alloy is attached to proxy network for Traefik exposure
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?ms)(\n  alloy:\n.*?\n    networks:\n      - observability-internal\n)(?!\s*-\s+proxy)'
    replace: '\1      - proxy\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Remove misplaced Alloy HTTP listen flag from unrelated commands
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?m)^      - --server\.http\.listen-addr=0\.0\.0\.0:12345\n'
    replace: ""
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Alloy listens on 0.0.0.0 for reverse proxy access
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?ms)(\n  alloy:\n.*?\n    command:\n      - run\n      - --stability\.level=public-preview\n)(\s*      - --server\.http\.listen-addr=0\.0\.0\.0:12345\n)?'
    replace: '\1      - --server.http.listen-addr=0.0.0.0:12345\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Expose Alloy through Traefik in observability project
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "    # {mark} alloy traefik managed block"
    insertafter: '      - alloy-data:/var/lib/alloy'
    block: |
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.alloy-web.rule=Host(`${ALLOY_HOSTNAME:-alloy}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.alloy-web.entrypoints=web"
          - "traefik.http.routers.alloy-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
          - "traefik.http.routers.alloy-websecure.rule=Host(`${ALLOY_HOSTNAME:-alloy}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.alloy-websecure.entrypoints=websecure"
          - "traefik.http.routers.alloy-websecure.service=alloy-service"
          - "traefik.http.routers.alloy-websecure.tls=true"
          - "traefik.http.routers.alloy-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
          - "traefik.http.routers.alloy-websecure.middlewares=security-headers@file"
          - "traefik.http.services.alloy-service.loadbalancer.server.port=12345"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Normalize observability Traefik managed block indentation in compose
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?m)^(labels:|  - "traefik\.)'
    replace: "    \\1"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Stop legacy step-ca container when project does not declare step-ca service
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} stop step-ca
    chdir: "{{ deployment_project_repo_dir }}"
