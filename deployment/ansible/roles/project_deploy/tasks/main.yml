- name: Remove legacy wikijs-oauth2-proxy container when project does not declare it
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} rm -f wikijs-oauth2-proxy
    chdir: "{{ deployment_project_repo_dir }}"
