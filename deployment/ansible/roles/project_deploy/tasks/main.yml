    line: "BIND_BIND_ADDRESS={{ ansible_host | default(inventory_hostname) }}"
  when: deployment_project_manifest_data.id == "traefik-dns-bind"

- name: Regenerate project managed environment artifacts from .env
  ansible.builtin.command:
    cmd: ./scripts/env-generate.sh --mode=full
    chdir: "{{ deployment_project_repo_dir }}"
  changed_when: true
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Set internal Step-CA ACME directory URL for traefik-stepca project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^STEP_CA_CA_SERVER="
    line: "STEP_CA_CA_SERVER=https://step-ca:9000/acme/{{ deployment_project_stepca_acme_provisioner }}/directory"
  when: deployment_project_manifest_data.id == "traefik-stepca"

- name: Set Step-CA issuer identity defaults for stepca-acme projects
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: "CA_NAME", value: "\"aladroc.io\"" }
    - { key: "CA_SUBJECT_O", value: "\"AMOU\"" }
    - { key: "CA_SUBJECT_OU", value: "infra" }
    - { key: "CA_SUBJECT_CN", value: "aladroc.io" }
  when: deployment_project_effective_tls_mode == "stepca-acme"

- name: Ensure stepca dependency host is available for external stepca-acme projects
  ansible.builtin.assert:
    that:
      - deployment_project_stepca_dependency_host_ip | trim | length > 0
      - deployment_project_stepca_dependency_root_cert_path | trim | length > 0
    fail_msg: >-
      stepca-acme project without local step-ca requires dependency host/cert inputs
      (deployment_project_stepca_dependency_host_ip and deployment_project_stepca_dependency_root_cert_path).
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Resolve external StepCA hostname for dependency projects
  ansible.builtin.set_fact:
    deployment_project_stepca_external_host: "step-ca.{{ deployment_project_base_domain_cmd.stdout | trim }}"
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Ensure dependency StepCA host mapping in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: ".*\\s{{ deployment_project_stepca_external_host | regex_escape() }}(\\s|$)"
    line: "{{ deployment_project_stepca_dependency_host_ip | trim }} {{ deployment_project_stepca_external_host }}"
    create: false
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Set external Step-CA ACME directory URL for stepca-acme dependency projects
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^STEP_CA_CA_SERVER="
    line: "STEP_CA_CA_SERVER=https://{{ deployment_project_stepca_external_host }}:9000/acme/{{ deployment_project_stepca_acme_provisioner }}/directory"
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Ensure local StepCA cert directory exists for external dependency trust
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/step-ca/certs"
    state: directory
    mode: "0755"
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Import dependency StepCA root certificate for external stepca-acme projects
  ansible.builtin.copy:
    src: "{{ deployment_project_stepca_dependency_root_cert_path }}"
    dest: "{{ deployment_project_repo_dir }}/services/step-ca/certs/root_ca.crt"
    mode: "0644"
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' not in deployment_project_manifest_data.services"

- name: Normalize K6 trend stats env value for shell-safe sourcing
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^K6_PROMETHEUS_RW_TREND_STATS="
    line: "K6_PROMETHEUS_RW_TREND_STATS=\"p(50),p(90),p(95),p(99),min,max,avg\""
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Render Traefik dynamic configuration from project env
  ansible.builtin.command:
    cmd: ./scripts/traefik-render-dynamic.sh
    chdir: "{{ deployment_project_repo_dir }}"
  changed_when: true
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Render Traefik static configuration from project env
  ansible.builtin.command:
    cmd: ./scripts/traefik-render-static.sh
    chdir: "{{ deployment_project_repo_dir }}"
  changed_when: true
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Check whether step-ca is already initialized
  ansible.builtin.stat:
    path: "{{ deployment_project_repo_dir }}/services/step-ca/config/ca.json"
  register: deployment_project_stepca_ca_json_stat
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Check whether step-ca intermediate cert is present
  ansible.builtin.stat:
    path: "{{ deployment_project_repo_dir }}/services/step-ca/certs/intermediate_ca.crt"
  register: deployment_project_stepca_intermediate_cert_stat
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Check whether step-ca root cert is present
  ansible.builtin.stat:
    path: "{{ deployment_project_repo_dir }}/services/step-ca/certs/root_ca.crt"
  register: deployment_project_stepca_root_cert_stat
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Resolve step-ca bootstrap requirement
  ansible.builtin.set_fact:
    deployment_project_stepca_bootstrap_required: >-
      {{
        not (
          (deployment_project_stepca_ca_json_stat.stat.exists | default(false))
          and
          (deployment_project_stepca_intermediate_cert_stat.stat.exists | default(false))
          and
          (deployment_project_stepca_root_cert_stat.stat.exists | default(false))
        )
      }}
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Ensure step-ca runtime password file exists from .env
  ansible.builtin.shell: |
    set -euo pipefail
    step_ca_password="$(grep -E '^STEP_CA_PASSWORD=' .env | tail -n1 | cut -d= -f2-)"
    [ -n "${step_ca_password}" ]
    printf '%s' "${step_ca_password}" > services/step-ca/secrets/password
    chmod 644 services/step-ca/secrets/password
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  changed_when: true
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Start step-ca service prior to bootstrap
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} up -d step-ca
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  changed_when: true
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"
    - not (deployment_project_stepca_bootstrap_required | default(true))

- name: Bootstrap step-ca for first-run project deployment (non-interactive)
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a

    ca_name="${CA_NAME:-${STEP_CA_NAME:-${CA_SUBJECT_CN:-}}}"
    if [ -z "${ca_name}" ]; then
      echo "CA_NAME, STEP_CA_NAME, or CA_SUBJECT_CN must be set in .env" >&2
      exit 1
    fi

    ca_dns_raw="${CA_DNS:-}"
    ca_ips_raw="${CA_IPS:-}"
    step_ca_dns="${STEP_CA_DNS:-}"
    if [ -z "${ca_dns_raw}" ] && [ -z "${ca_ips_raw}" ]; then
      if [ -z "${step_ca_dns}" ]; then
        step_ca_dns="step-ca,localhost,127.0.0.1,step-ca.${DEV_DOMAIN}"
      fi
      ca_dns_list="${step_ca_dns}"
    else
      ca_dns_list="${ca_dns_raw}"
      if [ -n "${ca_ips_raw}" ]; then
        if [ -n "${ca_dns_list}" ]; then
          ca_dns_list="${ca_dns_list},${ca_ips_raw}"
        else
          ca_dns_list="${ca_ips_raw}"
        fi
      fi
    fi

    rm -rf services/step-ca/config/* services/step-ca/certs/* services/step-ca/secrets/*
    mkdir -p services/step-ca/config services/step-ca/certs services/step-ca/secrets

    printf '%s' "${STEP_CA_PASSWORD}" > services/step-ca/secrets/password
    printf '%s' "${STEP_CA_ADMIN_PROVISIONER_PASSWORD}" > services/step-ca/secrets/admin_password
    chmod 644 services/step-ca/secrets/password services/step-ca/secrets/admin_password

    ./scripts/compose.sh --profile stepca run --rm --no-deps --entrypoint /bin/sh step-ca -c "
      set -euo pipefail
      step ca init \
        --name \"${ca_name}\" \
        --dns \"${ca_dns_list}\" \
        --address ':9000' \
        --provisioner admin \
        --password-file /home/step/secrets/password \
        --provisioner-password-file /home/step/secrets/admin_password
    "

    ./scripts/compose.sh --profile stepca up -d step-ca
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  register: deployment_project_stepca_bootstrap_cmd
  changed_when: >-
    (deployment_project_stepca_bootstrap_cmd.stdout | default('')) is not search('already initialized')
    and
    (deployment_project_stepca_bootstrap_cmd.stderr | default('')) is not search('already initialized')
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"
    - deployment_project_stepca_bootstrap_required | default(true)

- name: Read step-ca admin password from project .env
  ansible.builtin.command:
    cmd: "bash -lc \"awk -F= '$1==\\\"STEP_CA_ADMIN_PROVISIONER_PASSWORD\\\" {print $2}' .env | tail -n1 | tr -d '\\\"' | xargs\""
  args:
    chdir: "{{ deployment_project_repo_dir }}"
  register: deployment_project_stepca_admin_password_cmd
  changed_when: false
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Assert step-ca admin password is available
  ansible.builtin.assert:
    that:
      - deployment_project_stepca_admin_password_cmd.stdout | trim | length > 0
    fail_msg: "STEP_CA_ADMIN_PROVISIONER_PASSWORD must be set in project .env for step-ca ACME provisioning."
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Ensure step-ca ACME provisioner exists
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a

    acme_name="{{ deployment_project_stepca_acme_provisioner }}"
    admin_name="{{ deployment_project_stepca_admin_provisioner }}"
    admin_password="{{ deployment_project_stepca_admin_password_cmd.stdout | trim }}"

    set +e
    output="$(
      ./scripts/compose.sh --profile stepca exec -T step-ca \
        step ca provisioner add "${acme_name}" --type ACME \
        --ca-url "https://step-ca:9000" \
        --root /home/step/certs/root_ca.crt \
        --admin-subject "${admin_name}" \
        --admin-provisioner "${admin_name}" \
        --admin-password-file /home/step/secrets/admin_password 2>&1
    )"
    rc=$?
    set -e
    echo "${output}"
    if [ "${rc}" -eq 0 ]; then
      exit 0
    fi
    if echo "${output}" | grep -q "already exists"; then
      exit 0
    fi
    exit "${rc}"
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  register: deployment_project_stepca_provisioner_cmd
  changed_when: >-
    (deployment_project_stepca_provisioner_cmd.stdout | default('')) is search('Create') or
    (deployment_project_stepca_provisioner_cmd.stdout | default('')) is search('created') or
    (deployment_project_stepca_provisioner_cmd.stderr | default('')) is search('Create') or
    (deployment_project_stepca_provisioner_cmd.stderr | default('')) is search('created')
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Restart step-ca to load current provisioner configuration
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} up -d --force-recreate step-ca
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  changed_when: true
  when:
    - "'step-ca' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Configure observability grafana router middleware for Keycloak forward auth
  ansible.builtin.stat:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
  register: deployment_project_observability_compose_stat
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Assert observability compose exists in pinned repo for observability project
  ansible.builtin.assert:
    that:
      - deployment_project_observability_compose_stat.stat.exists
    fail_msg: "services/observability/compose.yml not found in pinned repo_ref. Update manifest repo_ref for traefik-observability."
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Configure observability grafana router middleware for Keycloak forward auth
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: 'traefik\.http\.routers\.grafana-websecure\.middlewares='
    line: '      - "traefik.http.routers.grafana-websecure.middlewares=security-headers@file"'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Enforce explicit TLS certresolver usage for observability routers
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?m)^(\s*- "traefik\.http\.routers\.(grafana|prometheus)-websecure\.tls\.certresolver=)\$\{TLS_CERT_RESOLVER:-\}"$'
    replace: '\1${TLS_CERT_RESOLVER}"'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Configure Grafana OIDC environment in observability compose
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "      # {mark} grafana oidc managed block"
    insertafter: '      - GF_AUTH_ANONYMOUS_ENABLED=false'
    block: |
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN=false
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=false
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${KEYCLOAK_OIDC_AUTH_URL}
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${KEYCLOAK_OIDC_TOKEN_URL}
      - GF_AUTH_GENERIC_OAUTH_API_URL=${KEYCLOAK_OIDC_USERINFO_URL}
      - GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA=/etc/grafana/certs/stepca-root.crt
      - GF_AUTH_GENERIC_OAUTH_TLS_SKIP_VERIFY_INSECURE=true
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Normalize Grafana OIDC block indentation in observability compose
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: "(?m)^(- GF_AUTH_[A-Z_]+=.*)$"
    replace: "      \\1"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Mount StepCA root CA into Grafana container for OIDC TLS verification
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    insertafter: '      - ./services/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro'
    regexp: 'stepca-root\.crt:/etc/grafana/certs/stepca-root\.crt:ro'
    line: '      - ./services/step-ca/certs/root_ca.crt:/etc/grafana/certs/stepca-root.crt:ro'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Expose Prometheus through Traefik in observability project
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "    # {mark} prometheus traefik managed block"
    insertafter: '      - prometheus-data:/prometheus'
    block: |
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.prometheus-web.rule=Host(`${PROMETHEUS_HOSTNAME:-prometheus}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.prometheus-web.entrypoints=web"
          - "traefik.http.routers.prometheus-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
          - "traefik.http.routers.prometheus-websecure.rule=Host(`${PROMETHEUS_HOSTNAME:-prometheus}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.prometheus-websecure.entrypoints=websecure"
          - "traefik.http.routers.prometheus-websecure.service=prometheus-service"
          - "traefik.http.routers.prometheus-websecure.tls=true"
          - "traefik.http.routers.prometheus-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
          - "traefik.http.routers.prometheus-websecure.tls.domains[0].main=${PROMETHEUS_HOSTNAME:-prometheus}.${DEV_DOMAIN}"
          - "traefik.http.routers.prometheus-websecure.middlewares=security-headers@file"
          - "traefik.http.services.prometheus-service.loadbalancer.server.port=9090"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Loki is attached to proxy network for Traefik exposure
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?ms)(\n  loki:\n.*?\n    networks:\n      - observability-internal\n)(?!\s*-\s+proxy)'
    replace: '\1      - proxy\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Expose Loki through Traefik in observability project
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "    # {mark} loki traefik managed block"
    insertafter: '      - loki-data:/loki'
    block: |
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.loki-web.rule=Host(`${LOKI_HOSTNAME:-loki}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.loki-web.entrypoints=web"
          - "traefik.http.routers.loki-web.middlewares=${HTTP_TO_HTTPS_MIDDLEWARE:-redirect-to-https@file}"
          - "traefik.http.routers.loki-websecure.rule=Host(`${LOKI_HOSTNAME:-loki}.${DEV_DOMAIN}`)"
          - "traefik.http.routers.loki-websecure.entrypoints=websecure"
          - "traefik.http.routers.loki-websecure.service=loki-service"
          - "traefik.http.routers.loki-websecure.tls=true"
          - "traefik.http.routers.loki-websecure.tls.certresolver=${TLS_CERT_RESOLVER}"
          - "traefik.http.routers.loki-websecure.middlewares=loki-root-redirect,security-headers@file"
          - "traefik.http.middlewares.loki-root-redirect.redirectregex.regex=^https?://([^/]+)/?$"
          - "traefik.http.middlewares.loki-root-redirect.redirectregex.replacement=https://$${1}/metrics"
          - "traefik.http.services.loki-service.loadbalancer.server.port=3100"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Tempo is attached to proxy network for Traefik exposure
  ansible.builtin.replace:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    regexp: '(?ms)(\n  tempo:\n.*?\n    networks:\n      - observability-internal\n)(?!\s*-\s+proxy)'
    replace: '\1      - proxy\n'
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Expose Tempo through Traefik in observability project
  ansible.builtin.blockinfile:
    path: "{{ deployment_project_repo_dir }}/services/observability/compose.yml"
    marker: "    # {mark} tempo traefik managed block"
    insertafter: '      - tempo-data:/var/tempo'
    block: |
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.tempo-web.rule=Host(`${TEMPO_HOSTNAME:-tempo}.${DEV_DOMAIN}`)"
