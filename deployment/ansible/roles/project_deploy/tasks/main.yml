    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} up -d --force-recreate gitlab
  args:
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  changed_when: true
  when:
    - deployment_project_manifest_data.id == "traefik-gitlab"
    - deployment_project_gitlab_oidc_secret_sync_env is changed

- name: Check Wiki.js setup completion status in database
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a
    ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} exec -T wikijs-db \
      psql -U "${WIKIJS_DB_USER:-wikijs}" -d "${WIKIJS_DB_NAME:-wikijs}" -tAc "SELECT COUNT(*) FROM settings;" \
      | tail -n1 | tr -d '[:space:]'
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  register: deployment_project_wikijs_settings_count_cmd
  changed_when: false
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Resolve Wiki.js setup completion counter
  ansible.builtin.set_fact:
    deployment_project_wikijs_settings_count_effective: "{{ deployment_project_wikijs_settings_count_cmd.stdout | trim | regex_search('^[0-9]+$') | default('0', true) }}"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Bootstrap Wiki.js setup non-interactively on first run
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a
    payload=$(printf '{"siteUrl":"https://wikijs.%s","telemetry":false,"adminEmail":"%s","adminPassword":"%s"}' \
      "${DEV_DOMAIN}" "${WIKIJS_BOOTSTRAP_ADMIN_EMAIL}" "${WIKIJS_BOOTSTRAP_ADMIN_PASSWORD}")
    docker run --rm --network wikijs-internal curlimages/curl:8.12.1 \
      -fsS -X POST http://wikijs:3000/finalize \
      -H 'Content-Type: application/json' \
      -d "${payload}"
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  register: deployment_project_wikijs_finalize_cmd
  changed_when: true
  when:
    - deployment_project_manifest_data.id == "traefik-wikijs"
    - (deployment_project_wikijs_settings_count_effective | int) == 0

- name: Ensure Wiki.js local admin account matches bootstrap credentials
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a

    admin_hash="$(
      docker exec -e ADMIN_PASS="${WIKIJS_BOOTSTRAP_ADMIN_PASSWORD}" \
        wikijs node -e "const bcrypt=require('bcryptjs'); process.stdout.write(bcrypt.hashSync(process.env.ADMIN_PASS, 10));"
    )"

    docker exec -i wikijs-db \
      psql -U "${WIKIJS_DB_USER:-wikijs}" -d "${WIKIJS_DB_NAME:-wikijs}" \
      -v admin_email="${WIKIJS_BOOTSTRAP_ADMIN_EMAIL}" \
      -v admin_hash="${admin_hash}" <<'SQL'
    UPDATE users
      SET email = :'admin_email',
          name = 'Administrator',
          password = :'admin_hash',
          "isActive" = true,
          "isVerified" = true,
          "updatedAt" = NOW()::text
      WHERE id = 1
        AND "providerKey" = 'local';

    INSERT INTO "userGroups" ("userId", "groupId")
    VALUES (1, 1)
    ON CONFLICT DO NOTHING;
    SQL
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  register: deployment_project_wikijs_local_admin_contract_cmd
  changed_when: true
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Configure native Keycloak auth strategy in Wiki.js and keep local fallback enabled
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a
    keycloak_host="${KEYCLOAK_OIDC_BASE_URL}"
    keycloak_realm="${KEYCLOAK_REALM}"
    keycloak_auth_url="${keycloak_host}/realms/${keycloak_realm}/protocol/openid-connect/auth"
    keycloak_token_url="${keycloak_host}/realms/${keycloak_realm}/protocol/openid-connect/token"
    keycloak_userinfo_url="${keycloak_host}/realms/${keycloak_realm}/protocol/openid-connect/userinfo"
    keycloak_logout_url="${keycloak_host}/realms/${keycloak_realm}/protocol/openid-connect/logout"

    ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} exec -T wikijs-db \
      psql -U "${WIKIJS_DB_USER:-wikijs}" -d "${WIKIJS_DB_NAME:-wikijs}" \
      -v kc_host="${keycloak_host}" \
      -v kc_realm="${keycloak_realm}" \
      -v kc_client="${WIKIJS_OIDC_CLIENT_ID}" \
      -v kc_secret="${WIKIJS_OIDC_CLIENT_SECRET}" \
      -v kc_auth_url="${keycloak_auth_url}" \
      -v kc_token_url="${keycloak_token_url}" \
      -v kc_userinfo_url="${keycloak_userinfo_url}" \
      -v kc_logout_url="${keycloak_logout_url}" <<'SQL'
    INSERT INTO authentication
      ("key", "isEnabled", "config", "selfRegistration", "domainWhitelist", "autoEnrollGroups", "order", "strategyKey", "displayName")
    VALUES
      (
        'keycloak',
        true,
        json_build_object(
          'host', :'kc_host',
          'realm', :'kc_realm',
          'clientId', :'kc_client',
          'clientSecret', :'kc_secret',
          'authorizationURL', :'kc_auth_url',
          'tokenURL', :'kc_token_url',
          'userInfoURL', :'kc_userinfo_url',
          'logoutUpstream', true,
          'logoutURL', :'kc_logout_url',
          'logoutUpstreamRedirectLegacy', false
        )::json,
        true,
        '{"v":[]}'::json,
        '{"v":[1]}'::json,
        1,
        'keycloak',
        'Keycloak'
      )
    ON CONFLICT ("key") DO UPDATE
      SET "isEnabled" = EXCLUDED."isEnabled",
          "config" = EXCLUDED."config",
          "selfRegistration" = EXCLUDED."selfRegistration",
          "domainWhitelist" = EXCLUDED."domainWhitelist",
          "autoEnrollGroups" = EXCLUDED."autoEnrollGroups",
          "order" = EXCLUDED."order",
          "strategyKey" = EXCLUDED."strategyKey",
          "displayName" = EXCLUDED."displayName";

    UPDATE authentication
      SET "isEnabled" = true
      WHERE "key" = 'local';
    SQL
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  register: deployment_project_wikijs_auth_contract_cmd
  changed_when: true
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Restart Wiki.js service to apply auth strategy changes
  ansible.builtin.command:
    cmd: ./scripts/compose.sh --profile {{ deployment_project_manifest_data.compose_profile }} restart wikijs
    chdir: "{{ deployment_project_repo_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ deployment_project_manifest_data.id }}"
  changed_when: true
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Verify traefik serves non-default TLS certificate for whoami (stepca-acme)
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . ./.env
    set +a
    host="${WHOAMI_HOST:-whoami.${BASE_DOMAIN}}"
    issuer="$(echo | openssl s_client -connect 127.0.0.1:443 -servername "${host}" 2>/dev/null | openssl x509 -noout -issuer)"
    echo "${issuer}"
    if echo "${issuer}" | grep -q "TRAEFIK DEFAULT CERT"; then
      exit 1
    fi
  args:
    chdir: "{{ deployment_project_repo_dir }}"
    executable: /bin/bash
  register: deployment_project_tls_issuer_check
  changed_when: false
  retries: 10
  delay: 6
  until: deployment_project_tls_issuer_check.rc == 0
  when:
    - deployment_project_manifest_data.id == "traefik-stepca"
    - "'whoami' in deployment_project_manifest_data.services"
    - deployment_project_effective_tls_mode == "stepca-acme"

- name: Ensure deployment-project state directory exists for remote user
  ansible.builtin.file:
    path: "{{ deployment_project_state_home }}/{{ deployment_project_state_relpath | dirname }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: false

- name: Read current deployment-project state
  ansible.builtin.stat:
    path: "{{ deployment_project_state_home }}/{{ deployment_project_state_relpath }}"
  register: deployment_project_state_stat
  become: false

- name: Read current deployment-project state payload
  ansible.builtin.slurp:
    src: "{{ deployment_project_state_stat.stat.path }}"
  register: deployment_project_state_raw
  become: false
  when: deployment_project_state_stat.stat.exists

- name: Build updated deployment-project state payload
  ansible.builtin.set_fact:
    deployment_project_current_state: "{{ {'deployed_projects': []} }}"

- name: Parse existing deployment-project state payload
  ansible.builtin.set_fact:
    deployment_project_current_state: "{{ deployment_project_state_raw.content | b64decode | from_json }}"
  when:
    - deployment_project_state_stat.stat.exists
    - deployment_project_state_raw.content is defined
    - deployment_project_state_raw.content | b64decode | trim | length > 0

- name: Compose updated deployment-project state payload
  ansible.builtin.set_fact:
    deployment_project_state_payload:
      deployed_projects: "{{ ((deployment_project_current_state.deployed_projects | default([])) + [deployment_project_manifest_data.id]) | unique | sort }}"

- name: Persist deployment-project state payload
  ansible.builtin.copy:
    dest: "{{ deployment_project_state_home }}/{{ deployment_project_state_relpath }}"
    content: "{{ deployment_project_state_payload | to_nice_json }}"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: false
