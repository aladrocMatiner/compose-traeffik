    deployment_project_wikijs_oidc_redirect_uris:
      - "https://wikijs.{{ deployment_project_base_domain_cmd.stdout | trim }}/login/keycloak/callback"
    deployment_project_wikijs_oidc_web_origins:
      - "https://wikijs.{{ deployment_project_base_domain_cmd.stdout | trim }}"
    deployment_project_wikijs_oidc_post_logout_redirect_uri: "https://wikijs.{{ deployment_project_base_domain_cmd.stdout | trim }}"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Ensure OIDC client contract shape for wikijs project
  ansible.builtin.assert:
    that:
      - deployment_project_wikijs_oidc_client_id_effective | trim | length > 0
      - deployment_project_wikijs_oidc_redirect_uris | length > 0
      - deployment_project_wikijs_oidc_web_origins | length > 0
    fail_msg: "Malformed OIDC contract for wikijs project."
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Query Keycloak client by client_id in target realm (wikijs)
  ansible.builtin.uri:
    url: "{{ deployment_project_wikijs_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_wikijs_keycloak_realm_effective }}/clients?clientId={{ deployment_project_wikijs_oidc_client_id_effective | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ deployment_project_wikijs_keycloak_admin_access_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: deployment_project_wikijs_keycloak_client_lookup
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Parse existing OIDC client lookup result (wikijs)
  ansible.builtin.set_fact:
    deployment_project_wikijs_keycloak_existing_client: "{{ ((deployment_project_wikijs_keycloak_client_lookup.content | from_json) | first) if ((deployment_project_wikijs_keycloak_client_lookup.content | from_json) | length > 0) else {} }}"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Create OIDC client in Keycloak when missing (wikijs)
  ansible.builtin.uri:
    url: "{{ deployment_project_wikijs_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_wikijs_keycloak_realm_effective }}/clients"
    method: POST
    headers:
