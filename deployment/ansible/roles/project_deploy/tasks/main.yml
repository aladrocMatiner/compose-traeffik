---
- name: Validate deployment_project_manifest input
  ansible.builtin.assert:
    that:
      - deployment_project_manifest | length > 0
    fail_msg: "deployment_project_manifest is required"

- name: Load project manifest from controller
  ansible.builtin.set_fact:
    deployment_project_manifest_data: "{{ lookup('ansible.builtin.file', deployment_project_manifest) | from_json }}"

- name: Validate required manifest fields
  ansible.builtin.assert:
    that:
      - deployment_project_manifest_data.id is string
      - deployment_project_manifest_data.id | length > 0
      - deployment_project_manifest_data.description is string
      - deployment_project_manifest_data.description | length > 0
      - deployment_project_manifest_data.repo_url is string
      - deployment_project_manifest_data.repo_url | length > 0
      - deployment_project_manifest_data.repo_ref is string
      - deployment_project_manifest_data.repo_ref | length > 0
      - deployment_project_manifest_data.compose_profile is string
      - deployment_project_manifest_data.compose_profile | length > 0
      - deployment_project_manifest_data.services is sequence
      - deployment_project_manifest_data.services | length > 0
      - deployment_project_manifest_data.deploy_playbook is string
      - deployment_project_manifest_data.deploy_playbook | length > 0
      - deployment_project_manifest_data.required_env is sequence
      - deployment_project_manifest_data.tls_mode is string
      - deployment_project_manifest_data.tls_mode | length > 0
    fail_msg: "Invalid project manifest contract"

- name: Validate optional manifest fields
  ansible.builtin.assert:
    that:
      - >-
        (deployment_project_manifest_data.public_host is not defined)
        or (
          deployment_project_manifest_data.public_host is string
          and deployment_project_manifest_data.public_host | length > 0
        )
      - >-
        (deployment_project_manifest_data.depends_on_projects is not defined)
        or (deployment_project_manifest_data.depends_on_projects is sequence)
      - >-
        (deployment_project_manifest_data.oidc is not defined)
        or (
          deployment_project_manifest_data.oidc is mapping
          and deployment_project_manifest_data.oidc.enabled is boolean
        )
      - >-
        (deployment_project_manifest_data.oidc is not defined)
        or (deployment_project_manifest_data.oidc.realm is not defined)
        or (
          deployment_project_manifest_data.oidc.realm is string
          and deployment_project_manifest_data.oidc.realm | length > 0
        )
      - >-
        (deployment_project_manifest_data.oidc is not defined)
        or (deployment_project_manifest_data.oidc.client_id is not defined)
        or (
          deployment_project_manifest_data.oidc.client_id is string
          and deployment_project_manifest_data.oidc.client_id | length > 0
        )
    fail_msg: "Invalid optional manifest fields"

- name: Resolve effective tls_mode (manifest default with optional override)
  ansible.builtin.set_fact:
    deployment_project_effective_tls_mode: "{{ deployment_project_tls_mode_override | default('', true) | trim | default(deployment_project_manifest_data.tls_mode, true) }}"

- name: Resolve project repository destination
  ansible.builtin.set_fact:
    deployment_project_repo_dir: "{{ deployment_project_workspace_dir }}/{{ deployment_project_manifest_data.id }}"

- name: Ensure project workspace directory exists
  ansible.builtin.file:
    path: "{{ deployment_project_workspace_dir }}"
    state: directory
    mode: "0755"

- name: Clone or update project repository pinned ref
  ansible.builtin.git:
    repo: "{{ deployment_project_manifest_data.repo_url }}"
    dest: "{{ deployment_project_repo_dir }}"
    version: "{{ deployment_project_manifest_data.repo_ref }}"
    update: true
    force: true

- name: Backport stepca bootstrap script from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../scripts/{{ item }}"
    dest: "{{ deployment_project_repo_dir }}/scripts/{{ item }}"
    mode: "0755"
  loop:
    - stepca-bootstrap.sh
    - traefik-render-dynamic.sh
    - traefik-render-static.sh
  when: deployment_project_effective_tls_mode == "stepca-acme"

- name: Backport step-ca compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/step-ca/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/step-ca/compose.yml"
    mode: "0644"
  when:
    - deployment_project_effective_tls_mode == "stepca-acme"
    - "'step-ca' in deployment_project_manifest_data.services"

- name: Backport traefik compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/traefik/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/traefik/compose.yml"
    mode: "0644"
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Backport traefik ACME dashboard template from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/traefik/dynamic/dashboard-acme.yml"
    dest: "{{ deployment_project_repo_dir }}/services/traefik/dynamic/dashboard-acme.yml"
    mode: "0644"
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Backport whoami compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/whoami/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/whoami/compose.yml"
    mode: "0644"
  when: "'whoami' in deployment_project_manifest_data.services"

- name: Ensure dns-bind service directory exists in project repo
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/dns-bind"
    state: directory
    mode: "0755"
  when: "'bind' in deployment_project_manifest_data.services"

- name: Backport dns-bind compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/dns-bind/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/dns-bind/compose.yml"
    mode: "0644"
  when: "'bind' in deployment_project_manifest_data.services"

- name: Backport dns-bind configuration templates from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/dns-bind/config/"
    dest: "{{ deployment_project_repo_dir }}/services/dns-bind/config/"
    mode: "0644"
  when: "'bind' in deployment_project_manifest_data.services"

- name: Backport dns-bind zone data from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/dns-bind/zones/"
    dest: "{{ deployment_project_repo_dir }}/services/dns-bind/zones/"
    mode: "0644"
  when: "'bind' in deployment_project_manifest_data.services"

- name: Backport wikijs compose definition from controller workspace
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/wikijs"
    state: directory
    mode: "0755"
  when: "'wikijs' in deployment_project_manifest_data.services"

- name: Backport wikijs compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/wikijs/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/wikijs/compose.yml"
    mode: "0644"
  when: "'wikijs' in deployment_project_manifest_data.services"

- name: Backport semaphoreui compose definition from controller workspace
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/semaphoreui"
    state: directory
    mode: "0755"
  when: "'semaphoreui' in deployment_project_manifest_data.services"

- name: Backport semaphoreui compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/semaphoreui/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/semaphoreui/compose.yml"
    mode: "0644"
  when: "'semaphoreui' in deployment_project_manifest_data.services"

- name: Backport rocketchat compose definition from controller workspace
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/rocketchat"
    state: directory
    mode: "0755"
  when: "'rocketchat' in deployment_project_manifest_data.services"

- name: Backport rocketchat compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/rocketchat/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/rocketchat/compose.yml"
    mode: "0644"
  when: "'rocketchat' in deployment_project_manifest_data.services"

- name: Backport gitlab compose definition from controller workspace
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/gitlab"
    state: directory
    mode: "0755"
  when: "'gitlab' in deployment_project_manifest_data.services"

- name: Backport gitlab compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/gitlab/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/gitlab/compose.yml"
    mode: "0644"
  when: "'gitlab' in deployment_project_manifest_data.services"

- name: Backport keycloak compose definition from controller workspace
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/keycloak"
    state: directory
    mode: "0755"
  when: "'keycloak' in deployment_project_manifest_data.services"

- name: Backport keycloak compose definition from controller workspace
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../services/keycloak/compose.yml"
    dest: "{{ deployment_project_repo_dir }}/services/keycloak/compose.yml"
    mode: "0644"
  when: "'keycloak' in deployment_project_manifest_data.services"

- name: Backport compose wrapper for project compatibility
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../scripts/compose.sh"
    dest: "{{ deployment_project_repo_dir }}/scripts/compose.sh"
    mode: "0755"
  when: "'traefik' in deployment_project_manifest_data.services"

- name: Check if project .env exists
  ansible.builtin.stat:
    path: "{{ deployment_project_repo_dir }}/.env"
  register: deployment_project_env_stat

- name: Bootstrap project environment file when absent
  ansible.builtin.command:
    cmd: ./scripts/env-generate.sh --mode=prod
    chdir: "{{ deployment_project_repo_dir }}"
  changed_when: true
  when: not deployment_project_env_stat.stat.exists

- name: Ensure step-ca bootstrap directories are writable
  ansible.builtin.file:
    path: "{{ deployment_project_repo_dir }}/services/step-ca/{{ item }}"
    state: directory
    mode: "0777"
    recurse: true
  loop:
    - config
    - secrets
    - certs
  when: "'step-ca' in deployment_project_manifest_data.services"

- name: Read BASE_DOMAIN from project .env
  ansible.builtin.command:
    cmd: "bash -lc \"awk -F= '$1==\\\"BASE_DOMAIN\\\" {print $2}' .env | tail -n1 | tr -d '\\\"' | xargs\""
  args:
    chdir: "{{ deployment_project_repo_dir }}"
  register: deployment_project_base_domain_cmd
  changed_when: false

- name: Resolve project public host from manifest override or BASE_DOMAIN
  ansible.builtin.set_fact:
    deployment_project_public_host: >-
      {{
        deployment_project_manifest_data.public_host
          | default(deployment_project_manifest_data.id ~ '.' ~ (deployment_project_base_domain_cmd.stdout | trim), true)
      }}

- name: Validate resolved project public host
  ansible.builtin.assert:
    that:
      - deployment_project_public_host | length > 0
    fail_msg: "BASE_DOMAIN missing in .env and no public_host override provided"

- name: Ensure Keycloak admin username default in project .env
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_ADMIN="
    line: "KEYCLOAK_ADMIN=admin"
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Ensure Keycloak bootstrap realm default in project .env
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_BOOTSTRAP_REALM="
    line: "KEYCLOAK_BOOTSTRAP_REALM=local.test"
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Ensure Keycloak bootstrap username default in project .env
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_BOOTSTRAP_USERNAME="
    line: "KEYCLOAK_BOOTSTRAP_USERNAME=jose.romero"
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Ensure Keycloak bootstrap password default in project .env
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_BOOTSTRAP_PASSWORD="
    line: "KEYCLOAK_BOOTSTRAP_PASSWORD=abcd123"
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Read Keycloak admin password from project .env
  ansible.builtin.command:
    cmd: "bash -lc \"awk -F= '$1==\\\"KEYCLOAK_ADMIN_PASSWORD\\\" {print $2}' .env | tail -n1 | tr -d '\\\"' | xargs\""
  args:
    chdir: "{{ deployment_project_repo_dir }}"
  register: deployment_project_keycloak_admin_password_cmd
  changed_when: false
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Generate Keycloak admin password when missing
  ansible.builtin.command:
    cmd: "bash -lc \"openssl rand -hex 16\""
  register: deployment_project_keycloak_admin_password_generated
  changed_when: true
  when:
    - deployment_project_manifest_data.id == "traefik-keycloak"
    - deployment_project_keycloak_admin_password_cmd.stdout | trim | length == 0

- name: Resolve effective Keycloak admin password
  ansible.builtin.set_fact:
    deployment_project_keycloak_admin_password_effective: >-
      {{
        (deployment_project_keycloak_admin_password_cmd.stdout | trim)
          if (deployment_project_keycloak_admin_password_cmd.stdout | trim | length > 0)
          else (deployment_project_keycloak_admin_password_generated.stdout | trim)
      }}
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Persist Keycloak admin password in project .env
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_ADMIN_PASSWORD="
    line: "KEYCLOAK_ADMIN_PASSWORD={{ deployment_project_keycloak_admin_password_effective }}"
  when: deployment_project_manifest_data.id == "traefik-keycloak"

- name: Validate Keycloak dependency contract for observability project
  ansible.builtin.assert:
    that:
      - deployment_project_keycloak_dependency_host_ip | default('') | trim | length > 0
      - deployment_project_keycloak_admin_username | default('') | trim | length > 0
      - deployment_project_keycloak_admin_password | default('') | trim | length > 0
    fail_msg: >-
      Missing Keycloak dependency context for OIDC provisioning.
      Deploy/fix traefik-keycloak first, then retry this project deployment.
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Resolve effective OIDC realm/client for observability project
  ansible.builtin.set_fact:
    deployment_project_keycloak_realm_effective: "{{ deployment_project_manifest_data.oidc.realm | default(deployment_project_keycloak_realm | default('local.test', true), true) }}"
    deployment_project_keycloak_client_id_effective: "{{ deployment_project_manifest_data.oidc.client_id | default(deployment_project_keycloak_grafana_client_id | default('grafana', true), true) }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Resolve effective Keycloak OIDC base URL for observability project
  ansible.builtin.set_fact:
    deployment_project_keycloak_oidc_base_url_effective: "{{ deployment_project_keycloak_oidc_base_url | default('https://keycloak.' ~ (deployment_project_base_domain_cmd.stdout | trim), true) }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure default KEYCLOAK_OIDC_BASE_URL for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_OIDC_BASE_URL="
    line: "KEYCLOAK_OIDC_BASE_URL={{ deployment_project_keycloak_oidc_base_url_effective }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure KEYCLOAK_REALM for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_REALM="
    line: "KEYCLOAK_REALM={{ deployment_project_keycloak_realm_effective }}"
  when:
    - deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure GRAFANA_OIDC_CLIENT_ID for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^GRAFANA_OIDC_CLIENT_ID="
    line: "GRAFANA_OIDC_CLIENT_ID={{ deployment_project_keycloak_client_id_effective }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Read existing GRAFANA_OIDC_CLIENT_SECRET from project .env
  ansible.builtin.command:
    cmd: "bash -lc \"awk -F= '$1==\\\"GRAFANA_OIDC_CLIENT_SECRET\\\" {print $2}' .env | tail -n1 | tr -d '\\\"' | xargs\""
  args:
    chdir: "{{ deployment_project_repo_dir }}"
  register: deployment_project_grafana_oidc_client_secret_cmd
  changed_when: false
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Generate Grafana OIDC client secret when absent
  ansible.builtin.command:
    cmd: "bash -lc \"openssl rand -hex 24\""
  register: deployment_project_grafana_oidc_client_secret_generated
  changed_when: true
  when:
    - deployment_project_manifest_data.id == "traefik-observability"
    - deployment_project_keycloak_grafana_client_secret | default('') | trim | length == 0
    - deployment_project_grafana_oidc_client_secret_cmd.stdout | trim | length == 0

- name: Resolve effective Grafana OIDC client secret
  ansible.builtin.set_fact:
    deployment_project_grafana_oidc_client_secret_effective: >-
      {{
        (deployment_project_keycloak_grafana_client_secret | trim)
          if (deployment_project_keycloak_grafana_client_secret | default('') | trim | length > 0)
          else (
            (deployment_project_grafana_oidc_client_secret_cmd.stdout | trim)
              if (deployment_project_grafana_oidc_client_secret_cmd.stdout | trim | length > 0)
              else (deployment_project_grafana_oidc_client_secret_generated.stdout | trim)
          )
      }}
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure GRAFANA_OIDC_CLIENT_SECRET for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^GRAFANA_OIDC_CLIENT_SECRET="
    line: "GRAFANA_OIDC_CLIENT_SECRET={{ deployment_project_grafana_oidc_client_secret_effective }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure KEYCLOAK_OIDC_AUTH_URL for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_OIDC_AUTH_URL="
    line: "KEYCLOAK_OIDC_AUTH_URL={{ deployment_project_keycloak_oidc_base_url_effective ~ '/realms/' ~ deployment_project_keycloak_realm_effective ~ '/protocol/openid-connect/auth' }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure KEYCLOAK_OIDC_TOKEN_URL for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_OIDC_TOKEN_URL="
    line: "KEYCLOAK_OIDC_TOKEN_URL={{ deployment_project_keycloak_oidc_base_url_effective ~ '/realms/' ~ deployment_project_keycloak_realm_effective ~ '/protocol/openid-connect/token' }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure KEYCLOAK_OIDC_USERINFO_URL for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_OIDC_USERINFO_URL="
    line: "KEYCLOAK_OIDC_USERINFO_URL={{ deployment_project_keycloak_oidc_base_url_effective ~ '/realms/' ~ deployment_project_keycloak_realm_effective ~ '/protocol/openid-connect/userinfo' }}"
  when: deployment_project_manifest_data.id == "traefik-observability"

- name: Ensure Traefik Keycloak host mapping IP for observability project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^TRAEFIK_KEYCLOAK_HOST_IP="
    line: "TRAEFIK_KEYCLOAK_HOST_IP={{ deployment_project_keycloak_dependency_host_ip }}"
  when:
    - deployment_project_manifest_data.id == "traefik-observability"
    - deployment_project_keycloak_dependency_host_ip | default('') | trim | length > 0

- name: Ensure Keycloak hostname mapping for observability host resolver
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: ".*\\skeycloak\\.{{ deployment_project_base_domain_cmd.stdout | trim | regex_escape() }}(\\s|$)"
    line: "{{ deployment_project_keycloak_dependency_host_ip }} keycloak.{{ deployment_project_base_domain_cmd.stdout | trim }}"
    create: false
  when:
    - deployment_project_manifest_data.id == "traefik-observability"
    - deployment_project_keycloak_dependency_host_ip | default('') | trim | length > 0

- name: Validate Keycloak dependency contract for wikijs project
  ansible.builtin.assert:
    that:
      - deployment_project_keycloak_dependency_host_ip | default('') | trim | length > 0
      - deployment_project_keycloak_admin_username | default('') | trim | length > 0
      - deployment_project_keycloak_admin_password | default('') | trim | length > 0
    fail_msg: >-
      Missing Keycloak dependency context for Wiki.js OIDC provisioning.
      Deploy/fix traefik-keycloak first, then retry this project deployment.
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Resolve effective OIDC realm/client for wikijs project
  ansible.builtin.set_fact:
    deployment_project_wikijs_keycloak_realm_effective: "{{ deployment_project_manifest_data.oidc.realm | default(deployment_project_keycloak_realm | default('local.test', true), true) }}"
    deployment_project_wikijs_keycloak_client_id_effective: "{{ deployment_project_manifest_data.oidc.client_id | default(deployment_project_keycloak_wikijs_client_id | default('wikijs', true), true) }}"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Resolve effective Keycloak OIDC base URL for wikijs project
  ansible.builtin.set_fact:
    deployment_project_wikijs_keycloak_oidc_base_url_effective: "{{ deployment_project_keycloak_oidc_base_url | default('https://keycloak.' ~ (deployment_project_base_domain_cmd.stdout | trim), true) }}"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Ensure WIKIJS_HOSTNAME for wikijs project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^WIKIJS_HOSTNAME="
    line: "WIKIJS_HOSTNAME=wikijs"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Ensure WIKIJS_DB_USER for wikijs project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^WIKIJS_DB_USER="
    line: "WIKIJS_DB_USER=wikijs"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Ensure WIKIJS_DB_NAME for wikijs project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^WIKIJS_DB_NAME="
    line: "WIKIJS_DB_NAME=wikijs"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

- name: Ensure default KEYCLOAK_OIDC_BASE_URL for wikijs project
  ansible.builtin.lineinfile:
    path: "{{ deployment_project_repo_dir }}/.env"
    regexp: "^KEYCLOAK_OIDC_BASE_URL="
    line: "KEYCLOAK_OIDC_BASE_URL={{ deployment_project_wikijs_keycloak_oidc_base_url_effective }}"
  when: deployment_project_manifest_data.id == "traefik-wikijs"

