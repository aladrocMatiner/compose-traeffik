- name: Refresh OIDC client lookup after create (wikijs)
  ansible.builtin.uri:
    url: "{{ deployment_project_wikijs_keycloak_oidc_base_url_effective }}/admin/realms/{{ deployment_project_wikijs_keycloak_realm_effective }}/clients?clientId={{ deployment_project_wikijs_oidc_client_id_effective | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ deployment_project_wikijs_keycloak_admin_access_token }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: deployment_project_wikijs_keycloak_client_lookup_after_create
